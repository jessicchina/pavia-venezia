<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 40" width="32" height="40">
  <!-- Brown base -->
  <rect x="6" y="32" width="20" height="6" fill="#8B4513" stroke="black" stroke-width="0.5"/>
  <!-- White pole -->
  <rect x="14.5" y="14" width="3" height="20" fill="white" stroke="black" stroke-width="0.4"/>
  <!-- Top half of diamond -->
  <polygon points="16,2 28,9 4,9" fill="white" stroke="black" stroke-width="0.7"/>
  <!-- Bottom half of diamond -->
  <polygon points="4,9 28,9 16,16" fill="#e53935" stroke="black" stroke-width="0.7"/>
</svg>